<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Criar meu acesso · TriLumen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{ --bg:#0F0F10; --panel:#17171A; --ink:#EDE8DF; --faint:#8B8680; --line:#2A2A2E; --ouro:#D4AF37; --verde:#7FB069; --vermelho:#C86B6B; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',system-ui,sans-serif;
    min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card{ width:100%; max-width:420px; background:var(--panel); border:1px solid var(--line);
    border-radius:18px; padding:32px 26px; box-shadow:0 20px 60px rgba(0,0,0,.45); }
  .marca{ font-family:'Cormorant Garamond',serif; font-size:30px; letter-spacing:.5px; text-align:center; margin:0 0 4px; }
  .marca b{ color:var(--ouro); font-weight:600; }
  .sub{ text-align:center; color:var(--faint); font-size:13px; margin:0 0 24px; }
  h1{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:23px; margin:0 0 6px; }
  .oi{ color:var(--faint); font-size:14px; margin:0 0 20px; line-height:1.5; }
  label{ display:block; font-size:12px; color:var(--faint); margin:14px 0 6px; }
  input{ width:100%; padding:13px 14px; font-size:15px; font-family:inherit; color:var(--ink);
    background:#101013; border:1px solid var(--line); border-radius:10px; outline:none; }
  input:focus{ border-color:var(--ouro); }
  .btn{ width:100%; margin-top:22px; padding:14px; font-size:15px; font-weight:600; font-family:inherit;
    color:#1a1a1a; background:var(--ouro); border:0; border-radius:10px; cursor:pointer; }
  .btn:disabled{ opacity:.5; cursor:default; }
  .msg{ margin-top:16px; font-size:13.5px; line-height:1.5; text-align:center; }
  .msg.erro{ color:var(--vermelho); }
  .msg.ok{ color:var(--verde); }
  .dica{ color:var(--faint); font-size:12px; margin-top:10px; text-align:center; line-height:1.5; }
  .hide{ display:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="marca">Tri<b>Lúmen</b></div>
    <p class="sub">Seu espaço de acompanhamento</p>

    <div id="carregando">
      <p class="oi">Conferindo seu convite…</p>
    </div>

    <div id="form" class="hide">
      <h1>Criar minha senha</h1>
      <p class="oi" id="oi"></p>
      <label for="s1">Escolha uma senha</label>
      <input id="s1" type="password" autocomplete="new-password" placeholder="mínimo 6 caracteres"/>
      <label for="s2">Repita a senha</label>
      <input id="s2" type="password" autocomplete="new-password" placeholder="digite de novo"/>
      <button class="btn" id="btn" onclick="ativar()">Criar e entrar</button>
      <div class="msg" id="msg"></div>
      <p class="dica">Sua senha é só sua — nem seu mentor consegue vê-la.</p>
    </div>

    <div id="falhou" class="hide">
      <h1>Convite indisponível</h1>
      <p class="oi" id="motivo"></p>
      <p class="dica">Peça um novo link ao seu mentor — cada convite vale por 7 dias e só pode ser usado uma vez.</p>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const token = new URLSearchParams(location.search).get('t') || '';

async function checar(){
  if(!token){ return falhar('Este link está incompleto.'); }
  try{
    const r = await fetch('/api/access/check?t='+encodeURIComponent(token));
    const d = await r.json();
    if(!r.ok || d.error) return falhar(d.error || 'Convite inválido ou expirado.');
    $('carregando').classList.add('hide');
    $('form').classList.remove('hide');
    const primeiro = String(d.nome||'').trim().split(/\s+/)[0];
    $('oi').textContent = 'Olá, ' + primeiro + '. Crie uma senha para entrar no seu espaço.';
    $('s1').focus();
  }catch(e){ falhar('Não consegui conferir o convite agora. Tente de novo em instantes.'); }
}
function falhar(m){
  $('carregando').classList.add('hide'); $('form').classList.add('hide');
  $('falhou').classList.remove('hide'); $('motivo').textContent = m;
}
async function ativar(){
  const s1 = $('s1').value, s2 = $('s2').value, msg = $('msg');
  msg.className='msg';
  if(s1.length < 6){ msg.classList.add('erro'); msg.textContent='A senha precisa de pelo menos 6 caracteres.'; return; }
  if(s1 !== s2){ msg.classList.add('erro'); msg.textContent='As duas senhas não são iguais.'; return; }
  $('btn').disabled = true; msg.textContent = 'criando…';
  try{
    const r = await fetch('/api/access/activate', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: s1 }) });
    const d = await r.json();
    if(!r.ok || d.error) throw new Error(d.error || 'Não foi possível criar sua senha.');
    localStorage.setItem('lumen_token', d.token);
    if(d.name) localStorage.setItem('lumen_name', d.name);
    msg.classList.add('ok'); msg.textContent = 'Pronto! Entrando…';
    setTimeout(()=>{ location.href = '/'; }, 700);
  }catch(e){
    $('btn').disabled = false; msg.className='msg erro'; msg.textContent = e.message;
  }
}
$('s2') && $('s2').addEventListener('keydown', e => { if(e.key==='Enter') ativar(); });
checar();
</script>
</body>
</html>
